name: CI

on:
  push:
    branches: [main, "claude/**", "feature/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Lint — ruff check + ruff format
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install "ruff>=0.4.0"

      - name: ruff check
        run: ruff check .

      - name: ruff format
        run: ruff format --check .

      - name: Dependency vulnerability scan
        run: |
          pip install pip-audit
          pip-audit --requirement requirements.txt --strict
        continue-on-error: true  # advisory: 了解现有 CVE 数量后再决定是否强制

  # ---------------------------------------------------------------------------
  # Unit tests — all mock tests, integration tests excluded
  # ---------------------------------------------------------------------------
  unit-tests:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev dependencies
        run: pip install -e ".[dev,api]"

      - name: Run unit tests with coverage
        env:
          LLM_MOCK: "true"
        run: |
          pytest \
            --cov=engines \
            --cov-report=xml \
            --cov-report=term-missing \
            -q

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.11'
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Contract tests — JSON schema / Pydantic model consistency
  # ---------------------------------------------------------------------------
  contract-tests:
    name: Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package with dev dependencies
        run: pip install -e ".[dev,api]"

      - name: Run contract tests
        run: |
          pytest \
            -k "contract" \
            --tb=short \
            -v
