# 民间借贷纠纷：王某诉张某（2022年）
# Civil loan dispute: Wang v Zhang (2022)

case_id: "case-civil-loan-wang-zhang-2022"
case_slug: "wangzhang2022"
case_type: "civil_loan"
model: "claude-opus-4-6"

parties:
  plaintiff:
    party_id: "party-plaintiff-wang"
    name: "王某"
  defendant:
    party_id: "party-defendant-zhang"
    name: "张某"

summary:
  - ["出借转账", "2022-02-26~27 分5笔转出 228,000元"]
  - ["借条签署", "2022-03-01，本金218,000元，年利率3%，月还9,000元"]
  - ["逾期违约金", "月1.3%（借款人另承担律师费诉讼费）"]
  - ["还款争议", "原告主张已还30,500元；证据目录显示40,500元（差额10,000元）"]
  - ["诉请本金", "187,500元（以30,500元已还为准）"]
  - ["诉请利率", "年利率13.8%（LPR四倍）"]
  - ["律师费", "8,000元"]

materials:
  plaintiff:
    - source_id: "src-p-id"
      text: |
        当事人身份信息：
        原告：王某，男，110101198501011234，住北京市朝阳区。
        被告：张某，男，110101199001011234，住北京市海淀区。
      metadata:
        document_type: "identity_documents"
        submitter: "plaintiff"

    - source_id: "src-p-transfers-out"
      text: |
        原告出借款银行转账记录（共5笔，合计228,000元）：
        2022-02-26  王某→张某  50,000元
        2022-02-26  王某→张某  60,000元
        2022-02-26  王某→张某  50,000元
        2022-02-27  王某→张某  38,000元
        2022-02-27  王某→张某  30,000元
        用途：被告偿还本人信用卡欠款，合计出借228,000元。
      metadata:
        document_type: "bank_transfer_records"
        direction: "outgoing"
        submitter: "plaintiff"

    - source_id: "src-p-pre-note-repayment"
      text: |
        借条签署前还款记录：
        2022-02-28  张某→王某  10,000元  备注：还款
        该笔还款发生于借条签署前，借条本金228,000 - 10,000 = 218,000元。
      metadata:
        document_type: "bank_transfer_records"
        direction: "incoming"
        date: "2022-02-28"
        submitter: "plaintiff"

    - source_id: "src-p-note"
      text: |
        借条（原件，2022-03-01）：
        今借到王某人民币贰拾壹万捌仟元整（218,000.00元），借款用途：偿还本人信用卡欠款。
        借款期限：2022年3月1日至2024年3月1日。
        年利率3%，每月归还9,000元。
        逾期违约金：按每月剩余本金的1.3%计算。
        借款人承担出借人为追偿本借款发生的全部律师费及诉讼费用。
        借款人：张某，2022年3月1日。
      metadata:
        document_type: "loan_note"
        date: "2022-03-01"
        principal: "218000"
        submitter: "plaintiff"

    - source_id: "src-p-repayments"
      text: |
        借条签署后张某还款记录（原告主张口径，共30,500元）：
        2022-06-15  张某→王某  10,000元
        2022-12-20  张某→王某  10,000元
        2023-05-08  张某→王某  10,500元
        注：证据目录另列2023-03-30一笔10,000元，原告未计入，双方存在争议。
        按原告主张：尚欠本金 218,000 - 30,500 = 187,500元。
      metadata:
        document_type: "bank_transfer_records"
        direction: "incoming"
        submitter: "plaintiff"

    - source_id: "src-p-lawyer"
      text: |
        律师服务合同：
        委托人：王某，受托律师：李律师（某律师事务所）。
        代理案件：民间借贷纠纷（王某诉张某案）。
        代理费：8,000元，已付清。签署日期：2025年10月1日。
      metadata:
        document_type: "attorney_contract"
        amount: "8000"
        submitter: "plaintiff"

  defendant:
    - source_id: "src-d-id"
      text: "被告：张某，男，110101199001011234，住北京市海淀区。"
      metadata:
        document_type: "identity_documents"
        submitter: "defendant"

    - source_id: "src-d-repayments"
      text: |
        被告银行转账还款凭证（证据目录口径，共40,500元）：
        2022-06-15  张某→王某  10,000元
        2022-12-20  张某→王某  10,000元
        2023-03-30  张某→王某  10,000元（原告诉状未计入此笔，与证据目录存矛盾）
        2023-05-08  张某→王某  10,500元
        合计：40,500元。正确剩余本金：218,000 - 40,500 = 177,500元，非原告所称187,500元。
      metadata:
        document_type: "bank_transfer_records"
        direction: "outgoing"
        submitter: "defendant"

    - source_id: "src-d-objections"
      text: |
        利率及违约金异议：
        1. 借条约定年利率3%，原告主张13.8%无合同依据；逾期利息应按3%计算。
        2. 违约金月1.3%（年化15.6%）与利息不应重叠，依《民法典》第585条请求酌减。
        3. 律师费8,000元高于当地指导标准，请求酌减。
      metadata:
        document_type: "objection_statement"
        submitter: "defendant"

claims:
  - claim_id: "c-001"
    claim_category: "返还借款"
    title: "返还借款本金187,500元"
    claim_text: "被告应偿还借款本金187,500元（借条本金218,000元，已还30,500元，余欠187,500元）。"

  - claim_id: "c-002"
    claim_category: "利息"
    title: "按年利率13.8%支付逾期利息"
    claim_text: "自2024年3月2日起至实际还清之日，按年利率13.8%（LPR四倍）计算逾期利息。"

  - claim_id: "c-003"
    claim_category: "律师费"
    title: "支付律师费8,000元"
    claim_text: "借条明确约定借款人承担律师费，原告为追偿支出律师费8,000元，依约应由被告承担。"

defenses:
  - defense_id: "d-001"
    defense_category: "还款金额争议"
    against_claim_id: "c-001"
    title: "实际已还40,500元，剩余本金应为177,500元"
    defense_text: >
      证据目录显示被告已还款40,500元，原告诉状仅认可30,500元，
      差额10,000元（2023-03-30转账）有银行凭证，应予认定。
      正确剩余本金为177,500元，而非187,500元。

  - defense_id: "d-002"
    defense_category: "利率争议"
    against_claim_id: "c-002"
    title: "逾期利率应按借条3%计算，不应适用13.8%"
    defense_text: >
      借条仅约定年利率3%，原告以LPR四倍13.8%主张逾期利息无合同依据。
      违约金月1.3%与利息不应重叠，请求法院酌减至合理范围。

  - defense_id: "d-003"
    defense_category: "律师费争议"
    against_claim_id: "c-003"
    title: "律师费8,000元超出合理标准，请求酌减"
    defense_text: "虽借条有律师费条款，但8,000元超出当地指导收费标准，请求法院酌减至合理金额。"

