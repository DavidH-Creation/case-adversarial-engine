name: v0-5-evidence-index-contract
task_id: v0-5-evidence-index-contract
description: Define the input, output, and acceptance contract for the v0.5 evidence indexer without implementing OCR, retrieval, or search.
risk_level: medium
version: "1.0"
acceptance_criteria:
  - Define a stable evidence_index artifact contract for civil loan cases.
  - Include one example input fixture and one example output fixture linked by evidence_id.
  - Keep evidence status and access domain semantics aligned with the canonical model.
allowed_paths:
