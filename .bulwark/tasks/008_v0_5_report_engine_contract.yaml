name: v0-5-report-engine-contract
task_id: v0-5-report-engine-contract
description: Define the report artifact contract and traceability requirements for v0.5 without adding conversational follow-up or presentation-layer code.
risk_level: medium
version: "1.0"
acceptance_criteria:
