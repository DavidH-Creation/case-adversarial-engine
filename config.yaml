# Pipeline configuration defaults.
# CLI flags take priority over these values.
# config/model_tiers.yaml takes priority for model tier selection.
pipeline:
  # Default model used when config/model_tiers.yaml is absent and --model is not provided
  default_model: claude-sonnet-4-6
  # Token ceiling per output for adversarial debate rounds
  max_tokens_per_output: 2000
  # Step toggles — equivalent to CLI flags; CLI flags always take priority
  skip_pretrial: false
